<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diet & Fitness Dashboard</title>
    <!-- Generated by the diet tracking recipe. Rebuilt on weigh-in; daily data via diet-today.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
    <style>
        :root {
            --red: #E24B4A;
            --yellow: #EF9F27;
            --green: #639922;
            --orange: #F97316;
            --blue: #378ADD;
            --empty: #ddd;
            --text: #1a1a1a;
            --text2: #666;
            --bg: #fff;
            --bg2: #f5f5f5;
            --border: #e0e0e0;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --empty: #404040;
                --text: #e0e0e0;
                --text2: #999;
                --bg: #1a1a1a;
                --bg2: #252525;
                --border: #3a3a3a;
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: var(--text); background: var(--bg); padding: 20px; line-height: 1.5; }
        .wrap { max-width: 900px; margin: 0 auto; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 24px; }
        .section { margin-bottom: 32px; }
        .sec-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 14px; }
        .card-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
        .card-val { font-size: 22px; font-weight: 700; }
        .card-sub { font-size: 11px; color: var(--text2); margin-top: 3px; }
        .panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 16px; margin-bottom: 12px; }
        .bar-row { display: flex; align-items: center; margin: 10px 0; }
        .bar-label { font-size: 12px; color: var(--text2); min-width: 70px; flex-shrink: 0; }
        .bar-blocks { display: flex; gap: 2px; flex-shrink: 0; }
        .blk { width: 14px; height: 16px; border-radius: 2px; }
        .bar-info { font-size: 12px; color: var(--text2); margin-left: 10px; white-space: nowrap; }
        .bar-sub { font-size: 11px; color: var(--text2); margin-left: 80px; margin-top: -4px; margin-bottom: 6px; }
        .flag { color: var(--red); font-weight: 600; }
        .notes { background: var(--bg2); border: 1px solid var(--border); border-left: 3px solid var(--blue); border-radius: 6px; padding: 14px; font-size: 13px; line-height: 1.6; }
        .notes-title { font-weight: 600; margin-bottom: 8px; }
        .notes ul { margin: 0; padding-left: 20px; }
        .notes li { margin: 6px 0; }
        .meal-header td { font-size: 14px; padding-top: 12px !important; padding-bottom: 4px !important; }
        table.food { width: 100%; font-size: 12px; border-collapse: collapse; margin-bottom: 4px; }
        table.food th { text-align: left; color: var(--text2); font-weight: 500; padding: 2px 6px; border-bottom: 1px solid var(--border); }
        table.food td { padding: 2px 6px; }
        table.food .num { text-align: right; }
        .subtotal td, .grandtotal td { font-weight: 600; border-top: 1px solid var(--border); }
        .grandtotal td { font-size: 13px; }
        .ex-card { background: var(--bg); border-left: 3px solid var(--orange); padding: 10px 12px; border-radius: 4px; margin: 8px 0; font-size: 13px; }
        .remaining { font-size: 13px; font-weight: 600; margin-top: 10px; color: var(--text); }
        .err { background: var(--red); color: #fff; padding: 10px; border-radius: 4px; margin: 8px 0; font-size: 12px; display: none; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>Diet & Fitness Dashboard</h1>

    <!-- 1. METRICS — rendered from diet-today.js weight data + diet-progress.js -->
    <div class="section" id="metricsSection" style="display:none;">
        <div class="sec-title">Metrics</div>
        <div class="card-grid" id="metricsGrid"></div>
    </div>

    <!-- 2. MACRO REMAINING BARS — rendered from diet-today.js -->
    <div class="section">
        <div class="sec-title" id="dayHeader">Loading...</div>
        <div class="panel" id="macroPanel" style="display:none;">
            <div id="macroBars"></div>
            <div id="remainingLine" class="remaining"></div>
        </div>
    </div>

    <!-- 3. EXERCISE JOURNAL — rendered from diet-today.js -->
    <div class="section" id="exerciseSection" style="display:none;">
        <div class="sec-title">Exercise Journal</div>
        <div class="panel" id="exercisePanel">
            <div id="exerciseCards"></div>
        </div>
    </div>

    <!-- 4. FOOD JOURNAL — rendered from diet-today.js -->
    <div class="section" id="foodSection" style="display:none;">
        <div class="sec-title">Food Journal</div>
        <div class="panel" id="mealsPanel">
            <div id="mealsContent"></div>
        </div>
    </div>

    <!-- 4b. MEAL IDEAS — optional, rendered from proposed-diet-today.js -->
    <div class="section" id="mealIdeasSection" style="display:none;">
        <div class="sec-title">Meal Ideas</div>
        <div class="panel" id="mealIdeasPanel">
            <div id="mealIdeasContent"></div>
            <div id="mealIdeasGap" style="margin-top:10px; font-size:12px; color:var(--orange); font-weight:600;"></div>
        </div>
    </div>

    <!-- 5. COACH'S NOTES — rendered from diet-coach-notes.js -->
    <div class="section" id="coachSection" style="display:none;">
        <div class="sec-title">Coach's Notes</div>
        <div class="notes" id="coachNotes"></div>
    </div>

    <!-- 6. WHAT'S AHEAD — rendered from diet-coach-notes.js -->
    <div class="section" id="aheadSection" style="display:none;">
        <div class="sec-title">What's Ahead</div>
        <div class="notes" id="aheadNotes"></div>
    </div>

    <!-- 7. WEIGHT TREND CHART — rendered from diet-weight-history.js -->
    <div class="section" id="weightChartSection" style="display:none;">
        <div class="sec-title">Weight Trend</div>
        <div class="panel">
            <canvas id="weightChart" height="180"></canvas>
            <div id="chartErr" class="err"></div>
        </div>
    </div>

    <!-- 8. PROGRESS & PACE — rendered from diet-progress.js -->
    <div class="section" id="progressSection" style="display:none;">
        <div class="sec-title">Progress &amp; Pace</div>
        <div class="panel" id="progressPanel"></div>
    </div>

    <!-- 9. BODY COMPOSITION — rendered from diet-today.js weight -->
    <div class="section" id="compSection" style="display:none;">
        <div class="sec-title">Body Composition</div>
        <div class="panel" id="compPanel"></div>
    </div>

    <!-- 10. QUOTE — rendered from diet-coach-notes.js -->
    <div id="quoteBlock" style="text-align:center; margin-top:20px; padding:16px; font-style:italic; color:var(--text2); font-size:14px; line-height:1.6; display:none;"></div>
</div>

<!-- Load external data files.
     These are rewritten by the assistant on each log event.
     Only diet-today.js is required; the others are optional and enable
     weight charts, progress bars, coach's notes, and meal ideas. -->
<script src="diet-today.js"></script>
<script src="diet-weight-history.js"></script>
<script src="diet-progress.js"></script>
<script src="diet-coach-notes.js"></script>
<script src="proposed-diet-today.js"></script>

<script>
// === UTILITY ===
var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
var EMPTY = isDark ? '#404040' : '#ddd';
var RED = '#E24B4A', YEL = '#EF9F27', GRN = '#639922', ORG = '#F97316', BLU = '#378ADD';

// =============================================================
// 1. METRICS — shows weight card grid when weight data exists
// =============================================================
(function() {
    var D = window.DIET_TODAY || {};
    var P = window.DIET_PROGRESS || {};
    var w = D.weight || {};
    if (!w.lbs && !w.kg) return; // no weight data, skip metrics

    var grid = document.getElementById('metricsGrid');
    var sec = document.getElementById('metricsSection');
    if (!grid || !sec) return;
    sec.style.display = '';

    var lbs = w.lbs || 0;
    var kg = w.kg || 0;
    var bf = w.bf || 0;
    var mm = w.mm || 0;

    var cards = [
        { label: 'Weight', val: lbs || kg, sub: lbs ? (kg + ' kg') : '' }
    ];

    // Body fat (optional)
    if (bf) {
        var fatLbs = Math.round(lbs * bf / 100 * 10) / 10;
        cards.push({ label: 'Body Fat', val: bf + '%', sub: fatLbs + ' lbs fat' });
        var leanLbs = Math.round((lbs - fatLbs) * 10) / 10;
        cards.push({ label: 'Lean Mass', val: leanLbs, sub: mm ? ('MM ' + mm + ' (scale)') : '' });
    }

    // Progress from start (optional, from diet-progress.js)
    if (P.startWeight && lbs) {
        var fromStart = Math.round((P.startWeight - lbs) * 10) / 10;
        var arrow = fromStart >= 0 ? '&darr; ' : '&uarr; ';
        cards.push({ label: 'From Start', val: arrow + Math.abs(fromStart), sub: P.startWeight + ' &rarr; ' + lbs });
    }

    // Goal countdown (optional)
    if (P.goalDate) {
        var today = new Date(); today.setHours(0,0,0,0);
        var goal = new Date(P.goalDate + 'T00:00:00');
        var diff = Math.round((goal - today) / 86400000);
        if (diff > 0) {
            cards.push({ label: 'Goal Day', val: diff + ' days', sub: P.goalDate });
        }
    }

    grid.innerHTML = '';
    cards.forEach(function(c) {
        var card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = '<div class="card-label">' + c.label + '</div>' +
            '<div class="card-val">' + c.val + '</div>' +
            '<div class="card-sub">' + (c.sub || '') + '</div>';
        grid.appendChild(card);
    });
})();
</script>

<!-- Daily log + macro bars renderer (SEPARATE error scope) -->
<script>
try {
    (function() {
        if (!window.DIET_TODAY) return;
        var D = window.DIET_TODAY;

        // Day header
        var hdr = document.getElementById('dayHeader');
        if (hdr) hdr.textContent = (D.date || '') + ' — ' + (D.dayType || 'Rest day');

        var hasEx = D.exercise && D.exercise.length > 0;
        var hasMeals = D.meals && D.meals.length > 0;

        // =====================
        // 3. EXERCISE JOURNAL
        // =====================
        if (hasEx) {
            var exSec = document.getElementById('exerciseSection');
            var ec = document.getElementById('exerciseCards');
            if (exSec) exSec.style.display = 'block';
            if (ec) {
                ec.innerHTML = '';
                var sortedEx = D.exercise.slice().sort(function(a,b) {
                    return (a.time || '').localeCompare(b.time || '');
                });
                sortedEx.forEach(function(ex) {
                    var card = document.createElement('div');
                    card.className = 'ex-card';
                    var timeStr = ex.time ? '<span style="color:var(--text2); font-size:11px;">' + ex.time + '</span> ' : '';
                    var parts = [timeStr + '<strong>' + (ex.type || 'Exercise') + '</strong>'];
                    if (ex.desc) parts[0] += ' — ' + ex.desc;
                    var details = [];
                    if (ex.duration) details.push(ex.duration);
                    if (ex.distance) details.push(ex.distance + (ex.unit || ' km'));
                    if (ex.pace) details.push(ex.pace);
                    if (ex.avgHR) details.push(ex.avgHR + ' bpm');
                    if (ex.calories) details.push(ex.calories + ' cal');
                    if (details.length) parts.push(details.join(' &middot; '));
                    card.innerHTML = parts.join('<br>');
                    ec.appendChild(card);
                });
            }
        }

        // =====================
        // 4. FOOD JOURNAL
        // =====================
        var totCal=0, totP=0, totF=0, totC=0;
        if (hasMeals) {
            var foodSec = document.getElementById('foodSection');
            var mc = document.getElementById('mealsContent');
            if (foodSec) foodSec.style.display = 'block';
            if (mc) {
                mc.innerHTML = '';
                var sortedMeals = D.meals.slice().sort(function(a,b) {
                    return (a.time || '').localeCompare(b.time || '');
                });
                var tbl = document.createElement('table');
                tbl.className = 'food';
                var rows = '<tr><th>Item</th><th>Amount</th><th class="num">Cal</th><th class="num">P</th><th class="num">F</th><th class="num">C</th></tr>';
                sortedMeals.forEach(function(meal) {
                    var timeLabel = meal.time ? '<span style="color:var(--text2); font-weight:400; font-size:12px;">' + meal.time + '</span> ' : '';
                    rows += '<tr class="meal-header"><td colspan="6">' + timeLabel + '<strong>' + (meal.name || '') + '</strong></td></tr>';
                    var mCal=0, mP=0, mF=0, mC=0;
                    (meal.items || []).forEach(function(it) {
                        rows += '<tr><td>'+(it.item||'')+'</td><td>'+(it.amount||'')+'</td>';
                        rows += '<td class="num">'+(it.cal||0)+'</td><td class="num">'+(it.p||0)+'</td>';
                        rows += '<td class="num">'+(it.f||0)+'</td><td class="num">'+(it.c||0)+'</td></tr>';
                        mCal += it.cal||0; mP += it.p||0; mF += it.f||0; mC += it.c||0;
                    });
                    rows += '<tr class="subtotal"><td colspan="2">Subtotal</td><td class="num">'+mCal+'</td><td class="num">'+mP.toFixed(1)+'</td><td class="num">'+mF.toFixed(1)+'</td><td class="num">'+mC.toFixed(1)+'</td></tr>';
                    totCal+=mCal; totP+=mP; totF+=mF; totC+=mC;
                });
                rows += '<tr class="grandtotal"><td colspan="2">Total</td><td class="num">'+totCal+'</td><td class="num">'+totP.toFixed(1)+'</td><td class="num">'+totF.toFixed(1)+'</td><td class="num">'+totC.toFixed(1)+'</td></tr>';
                tbl.innerHTML = rows;
                mc.appendChild(tbl);
            }
        }

        // =====================
        // 2. MACRO REMAINING BARS
        // =====================
        var t = D.targets || {};
        var isCarb = (D.dayType || '').indexOf('CARB-LOAD') >= 0;
        var macroP = document.getElementById('macroPanel');
        var macroB = document.getElementById('macroBars');
        var remLine = document.getElementById('remainingLine');
        if (macroP) macroP.style.display = 'block';

        var exCal = 0;
        (D.exercise || []).forEach(function(ex) { exCal += ex.calories || 0; });

        function macroBar(label, val, target, type) {
            var pct = target > 0 ? Math.round(val / target * 100) : 0;
            var filled = Math.min(20, Math.round(pct * 20 / 100));
            if (pct >= 100) filled = 20;
            var color;
            if (type === 'floor') {
                color = pct < 50 ? RED : pct < 80 ? YEL : GRN;
            } else if (type === 'ceiling') {
                color = pct <= 79 ? GRN : pct <= 100 ? YEL : RED;
            } else {
                color = pct < 92 ? RED : pct <= 100 ? GRN : RED;
            }
            var row = document.createElement('div');
            row.className = 'bar-row';
            var lbl = document.createElement('div');
            lbl.className = 'bar-label';
            lbl.textContent = label;
            row.appendChild(lbl);
            var blocks = document.createElement('div');
            blocks.className = 'bar-blocks';
            for (var i = 0; i < 20; i++) {
                var b = document.createElement('div');
                b.className = 'blk';
                b.style.background = (i < filled) ? color : EMPTY;
                blocks.appendChild(b);
            }
            row.appendChild(blocks);
            var info = document.createElement('div');
            info.className = 'bar-info';
            var tgtStr = target.toLocaleString();
            if (label === 'Cal') {
                info.textContent = val + ' / ' + tgtStr + '  (' + pct + '%)';
            } else {
                info.textContent = Math.round(val*10)/10 + 'g / ' + target + 'g  (' + pct + '%)';
            }
            if (label === 'Protein' && pct < 25) { var sp = document.createElement('span'); sp.className='flag'; sp.textContent=' ← low'; info.appendChild(sp); }
            if (label === 'Fat' && pct >= 80) { var sp = document.createElement('span'); sp.className='flag'; sp.textContent=' ← high'; info.appendChild(sp); }
            row.appendChild(info);
            return row;
        }

        if (macroB) {
            macroB.innerHTML = '';
            macroB.appendChild(macroBar('Cal', totCal, t.calories || 1900, isCarb ? 'window' : 'ceiling'));
            if (exCal > 0) {
                var netRow = document.createElement('div');
                netRow.className = 'bar-row';
                var netL = document.createElement('div');
                netL.className = 'bar-label';
                netL.textContent = '  Net';
                netL.style.fontStyle = 'italic';
                netRow.appendChild(netL);
                var netBlocks = document.createElement('div');
                netBlocks.className = 'bar-blocks';
                var netVal = totCal - exCal;
                var tgtCal = t.calories || 1900;
                var grossPct = tgtCal > 0 ? Math.round(totCal / tgtCal * 100) : 0;
                var grossFilled = Math.min(20, Math.round(grossPct * 20 / 100));
                var netPct = tgtCal > 0 ? Math.round(netVal / tgtCal * 100) : 0;
                var netFilled = Math.max(0, Math.min(20, Math.round(netPct * 20 / 100)));
                for (var i = 0; i < 20; i++) {
                    var b = document.createElement('div');
                    b.className = 'blk';
                    if (i < netFilled) {
                        b.style.background = BLU;
                    } else if (i < grossFilled) {
                        b.style.background = 'repeating-linear-gradient(45deg,' + BLU + ',' + BLU + ' 2px, transparent 2px, transparent 4px)';
                        b.style.border = '1px solid ' + BLU;
                        b.style.boxSizing = 'border-box';
                    } else {
                        b.style.background = EMPTY;
                    }
                    netBlocks.appendChild(b);
                }
                netRow.appendChild(netBlocks);
                var netInfo = document.createElement('div');
                netInfo.className = 'bar-info';
                netInfo.textContent = netVal + ' net (' + netPct + '%)  · ' + exCal + ' cal burned';
                netRow.appendChild(netInfo);
                macroB.appendChild(netRow);
            }
            macroB.appendChild(macroBar('Protein', totP, t.protein || 150, 'floor'));
            macroB.appendChild(macroBar('Carbs', totC, t.carbs || 180, 'floor'));
            macroB.appendChild(macroBar('Fat', totF, t.fat || 70, 'ceiling'));
        }

        if (remLine) {
            var remCal = (t.calories||1900) - totCal;
            var remP = (t.protein||150) - totP;
            remLine.textContent = 'Remaining: ~' + Math.max(0,remCal).toLocaleString() + ' cal, ' + Math.max(0,Math.round(remP)) + 'g protein';
        }
    })();
} catch(e) {
    console.error('Daily log render error:', e);
}
</script>

<!-- Meal Ideas renderer (from proposed-diet-today.js — optional) -->
<script>
try {
    (function() {
        var P = window.PROPOSED_DIET;
        if (!P || !P.ideas || P.ideas.length === 0) return;
        var sec = document.getElementById('mealIdeasSection');
        var content = document.getElementById('mealIdeasContent');
        if (!sec || !content) return;
        sec.style.display = '';

        var tbl = document.createElement('table');
        tbl.className = 'food';
        var hdr = tbl.insertRow();
        ['Idea','Amount','Cal','P','F','C'].forEach(function(h) {
            var th = document.createElement('th');
            th.textContent = h;
            th.style.textAlign = h === 'Idea' || h === 'Amount' ? 'left' : 'right';
            th.style.padding = '4px 8px';
            th.style.borderBottom = '1px solid var(--border)';
            th.style.fontSize = '11px';
            th.style.color = 'var(--text2)';
            hdr.appendChild(th);
        });

        P.ideas.forEach(function(meal) {
            var mhdr = tbl.insertRow();
            var mhd = document.createElement('td');
            mhd.colSpan = 6;
            mhd.style.padding = '8px 8px 4px';
            mhd.style.fontWeight = '600';
            mhd.innerHTML = (meal.time ? '<span style="color:var(--text2);font-weight:400;">' + meal.time + '</span> ' : '') + meal.name;
            mhdr.appendChild(mhd);

            meal.items.forEach(function(it) {
                var r = tbl.insertRow();
                [{v:it.item,a:'left'},{v:it.amount,a:'left'},{v:Math.round(it.cal),a:'right'},{v:Math.round(it.p)+'g',a:'right'},{v:Math.round(it.f)+'g',a:'right'},{v:Math.round(it.c)+'g',a:'right'}].forEach(function(d) {
                    var td = document.createElement('td');
                    td.textContent = d.v;
                    td.style.textAlign = d.a;
                    td.style.padding = '2px 8px';
                    r.appendChild(td);
                });
            });
        });

        content.appendChild(tbl);
        if (P.gapNote) {
            document.getElementById('mealIdeasGap').textContent = P.gapNote;
        }
    })();
} catch(e) { console.error('Meal ideas render error:', e); }
</script>

<!-- Coach's Notes + What's Ahead (from diet-coach-notes.js — optional) -->
<script>
try {
    (function() {
        var C = window.DIET_COACH;
        if (!C) return;

        // Coach's Notes
        if (C.notes && C.notes.length) {
            var sec = document.getElementById('coachSection');
            var el = document.getElementById('coachNotes');
            if (sec && el) {
                sec.style.display = '';
                el.innerHTML = '<div class="notes-title">' + (C.title || "Coach's Notes") + '</div><ul>' +
                    C.notes.map(function(n) { return '<li>' + n + '</li>'; }).join('') + '</ul>';
            }
        }

        // What's Ahead
        if (C.ahead && C.ahead.length) {
            var aSec = document.getElementById('aheadSection');
            var aEl = document.getElementById('aheadNotes');
            if (aSec && aEl) {
                aSec.style.display = '';
                aEl.innerHTML = '<ul>' + C.ahead.map(function(n) { return '<li>' + n + '</li>'; }).join('') + '</ul>';
            }
        }

        // Quote
        if (C.quote && C.quote.text) {
            var qb = document.getElementById('quoteBlock');
            if (qb) {
                qb.style.display = '';
                qb.innerHTML = '&ldquo;' + C.quote.text + '&rdquo;<br><span style="font-size:12px; font-style:normal;">&mdash; ' + (C.quote.author || '') + '</span>';
            }
        }
    })();
} catch(e) { console.error('Coach notes render error:', e); }
</script>

<!-- Weight Trend Chart (from diet-weight-history.js — optional) -->
<script>
try {
    (function() {
        var H = window.DIET_WEIGHT_HISTORY;
        if (!H || !H.length || H.length < 2) return;

        var sec = document.getElementById('weightChartSection');
        if (sec) sec.style.display = '';

        var ctx = document.getElementById('weightChart');
        if (!ctx) return;

        var labels = H.map(function(e) { return e.d; });
        var data = H.map(function(e) { return e.w; });

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Weight',
                    data: data,
                    borderColor: '#378ADD',
                    backgroundColor: 'rgba(55,138,221,0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 2,
                    pointHoverRadius: 5
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    y: {
                        ticks: { color: isDark ? '#999' : '#666' },
                        grid: { color: isDark ? '#3a3a3a' : '#e0e0e0' }
                    },
                    x: {
                        ticks: { color: isDark ? '#999' : '#666', maxTicksLimit: 14 },
                        grid: { display: false }
                    }
                }
            }
        });
    })();
} catch(e) {
    console.error('Weight chart error:', e);
    var errEl = document.getElementById('chartErr');
    if (errEl) { errEl.style.display = 'block'; errEl.textContent = 'Chart error: ' + e.message; }
}
</script>

<!-- Progress & Pace bars (from diet-progress.js — optional) -->
<script>
try {
    (function() {
        var P = window.DIET_PROGRESS;
        if (!P || !P.bars || !P.bars.length) return;

        var sec = document.getElementById('progressSection');
        var panel = document.getElementById('progressPanel');
        if (!sec || !panel) return;
        sec.style.display = '';
        panel.innerHTML = '';

        P.bars.forEach(function(bar) {
            var row = document.createElement('div');
            row.className = 'bar-row';
            var lbl = document.createElement('div');
            lbl.className = 'bar-label';
            lbl.textContent = bar.label;
            row.appendChild(lbl);

            var blocks = document.createElement('div');
            blocks.className = 'bar-blocks';
            for (var i = 0; i < 20; i++) {
                var b = document.createElement('div');
                b.className = 'blk';
                b.style.background = (i < (bar.filled || 0)) ? (bar.color || GRN) : EMPTY;
                blocks.appendChild(b);
            }
            row.appendChild(blocks);

            var info = document.createElement('div');
            info.className = 'bar-info';
            info.textContent = bar.info || '';
            row.appendChild(info);
            panel.appendChild(row);

            if (bar.sub) {
                var subDiv = document.createElement('div');
                subDiv.className = 'bar-sub';
                subDiv.textContent = bar.sub;
                panel.appendChild(subDiv);
            }
        });

        if (P.trajectory) {
            var traj = document.createElement('div');
            traj.className = 'traj';
            traj.textContent = P.trajectory;
            panel.appendChild(traj);
        }
    })();
} catch(e) { console.error('Progress bars error:', e); }
</script>
</body>
</html>
